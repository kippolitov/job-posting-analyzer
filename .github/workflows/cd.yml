name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Serialize main-branch deployments; never cancel an in-progress deploy.
concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── CI gate (mirrors ci.yml) ──────────────────────────────────────────────
  extension-ci:
    name: Extension CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Lint
        run: npm run lint
        working-directory: extension

      - name: Unit tests
        uses: ./.github/actions/unit-tests
        with:
          working-directory: extension
          name: extension

      # No artifact is uploaded: builds with baked-in secrets must not be
      # publicly downloadable. Distribution happens via the release workflow,
      # which publishes to the private job-posting-analyzer-releases repo.
      - name: Build
        env:
          WXT_AZURE_FUNCTION_URL: ${{ secrets.AZURE_FUNCTION_URL }}
          WXT_AZURE_FUNCTION_KEY: ${{ secrets.AZURE_FUNCTION_KEY }}
          WXT_API_BASE_URL: ${{ secrets.WXT_API_BASE_URL }}
          WXT_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.WXT_GOOGLE_OAUTH_CLIENT_ID }}
          WXT_WEB_APP_URL: ${{ secrets.WXT_WEB_APP_URL }}
        run: npm run build
        working-directory: extension

  functions-ci:
    name: Functions CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Lint
        run: npm run lint
        working-directory: functions

      - name: Unit tests
        uses: ./.github/actions/unit-tests
        with:
          working-directory: functions
          name: functions
          test-filter: tests/unit

      # Includes the performance budgets (constitution QG-4) — the
      # analyze-document benchmark among them (specs/004 T051).
      - name: Integration tests (Azurite-backed, incl. performance budgets)
        run: npm run test:integration
        working-directory: functions

      - name: Build
        run: npm run build
        working-directory: functions

  web-ci:
    name: Web CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Unit tests
        uses: ./.github/actions/unit-tests
        with:
          working-directory: web
          name: web

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.WEB_API_BASE_URL }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
        run: npm run build
        working-directory: web

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          retention-days: 1
          path: web/dist

  # ── Coverage report → GitHub Pages ───────────────────────────────────────
  publish-coverage:
    name: Publish Coverage to Pages
    runs-on: ubuntu-latest
    needs: [extension-ci, functions-ci, web-ci]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download extension coverage
        uses: actions/download-artifact@v4
        with:
          name: extension-test-coverage-reports
          path: pages/extension

      - name: Download functions coverage
        uses: actions/download-artifact@v4
        with:
          name: functions-test-coverage-reports
          path: pages/functions

      - name: Download web coverage
        uses: actions/download-artifact@v4
        with:
          name: web-test-coverage-reports
          path: pages/web

      - name: Copy legal pages
        run: |
          mkdir -p pages/legal
          cp docs/legal/privacy-policy.html pages/legal/
          cp docs/legal/terms.html pages/legal/

      - name: Copy site pages
        run: |
          cp docs/pages/index.html pages/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Web app deployment → Azure Static Web Apps ────────────────────────────
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: [web-ci]
    permissions:
      contents: read
    steps:
      - name: Download web build (built with real secrets, unlike web-ci's placeholder build)
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web-dist
          skip_app_build: true

  # ── Azure Functions deployment ────────────────────────────────────────────
  deploy-functions:
    name: Deploy Functions
    runs-on: ubuntu-latest
    needs: [functions-ci]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Build TypeScript
        run: npm run build
        working-directory: functions

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: functions/

  # ── Auto version bump + tag (triggers release.yml) ───────────────────────
  version-and-tag:
    name: Version and Tag
    runs-on: ubuntu-latest
    needs: [extension-ci, functions-ci, web-ci]
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Bump version in extension/package.json
        id: bump
        run: |
          BUMP="${{ inputs.bump || 'patch' }}"
          cd extension
          npm version $BUMP --no-git-tag-version
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp CHANGELOG.md [Unreleased] with this version (skip if empty)
        id: changelog
        run: |
          set -euo pipefail
          FILE=CHANGELOG.md
          VERSION="${{ steps.bump.outputs.VERSION }}"
          DATE=$(date -u +%Y-%m-%d)

          # Everything between "## [Unreleased]" and the next "## [" heading.
          UNRELEASED_BODY=$(awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' "$FILE")
          TRIMMED=$(printf '%s\n' "$UNRELEASED_BODY" | sed '/^[[:space:]]*$/d')

          if [ -z "$TRIMMED" ]; then
            echo "CHANGELOG.md [Unreleased] is empty — no changelog section for v$VERSION."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            awk -v version="$VERSION" -v date="$DATE" '
              /^## \[Unreleased\]/ {
                print
                print ""
                print "## [" version "] - " date
                next
              }
              { print }
            ' "$FILE" > "$FILE.tmp" && mv "$FILE.tmp" "$FILE"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/package.json extension/package-lock.json
          if [ "${{ steps.changelog.outputs.changed }}" = "true" ]; then
            git add CHANGELOG.md
          fi
          git commit -m "chore: bump version to ${{ steps.bump.outputs.VERSION }} [skip ci]"
          git push

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.bump.outputs.VERSION }}" -m "Release v${{ steps.bump.outputs.VERSION }}"
          git push origin "v${{ steps.bump.outputs.VERSION }}"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run release.yml --ref main -f tag_name="v${{ steps.bump.outputs.VERSION }}"
