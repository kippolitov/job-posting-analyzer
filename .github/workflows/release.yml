name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

concurrency:
  group: release-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Build and Release Extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag_name || github.ref_name }}

      - name: Validate version matches tag
        run: |
          PKG_VERSION=$(jq -r '.version' extension/package.json)
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Check for duplicate release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          if gh release view "$TAG_NAME" --repo kippolitov/job-posting-analyzer-releases &>/dev/null; then
            echo "ERROR: GitHub Release $TAG_NAME already exists in job-posting-analyzer-releases"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Lint
        run: npm run lint
        working-directory: extension

      - name: Unit tests
        uses: ./.github/actions/unit-tests
        with:
          working-directory: extension
          name: extension

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.AZURE_FUNCTION_URL }}" ]; then
            echo "ERROR: AZURE_FUNCTION_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.RELEASES_REPO_TOKEN }}" ]; then
            echo "ERROR: RELEASES_REPO_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.WXT_API_BASE_URL }}" ]; then
            echo "ERROR: WXT_API_BASE_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.WXT_GOOGLE_OAUTH_CLIENT_ID }}" ]; then
            echo "ERROR: WXT_GOOGLE_OAUTH_CLIENT_ID secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.WXT_WEB_APP_URL }}" ]; then
            echo "ERROR: WXT_WEB_APP_URL secret is not set"
            exit 1
          fi

      - name: Build extension
        env:
          WXT_AZURE_FUNCTION_URL: ${{ secrets.AZURE_FUNCTION_URL }}
          WXT_AZURE_FUNCTION_KEY: ${{ secrets.AZURE_FUNCTION_KEY }}
          WXT_API_BASE_URL: ${{ secrets.WXT_API_BASE_URL }}
          WXT_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.WXT_GOOGLE_OAUTH_CLIENT_ID }}
          WXT_WEB_APP_URL: ${{ secrets.WXT_WEB_APP_URL }}
        run: npm run build
        working-directory: extension

      - name: Verify URLs baked into zipped extension
        run: |
          echo "Checking all JS output files for guard string..."
          if grep -rl 'not configured' extension/output/chrome-mv3/; then
            echo "ERROR: URL guard string found — WXT_AZURE_FUNCTION_URL was empty during zip/build"
            exit 1
          fi
          echo "Checking background.js contains the function URL..."
          if ! grep -q 'azurewebsites.net' extension/output/chrome-mv3/background.js; then
            echo "ERROR: Azure function URL not found in background.js after zip"
            exit 1
          fi
          echo "Checking build output contains the web app URL..."
          if ! grep -rq 'azurestaticapps.net' extension/output/chrome-mv3/; then
            echo "ERROR: Web app URL (WXT_WEB_APP_URL) not found anywhere in the build output —"
            echo "the AccountBar 'Open web app' link would silently not render (regression from #11)."
            exit 1
          fi
          echo "OK: URLs correctly baked in after zip rebuild"

      - name: Create archive
        run: |
          ARCHIVE="job-posting-analyzer-v${{ env.VERSION }}.zip"
          FOLDER="chrome-mv3-v${{ env.VERSION }}"
          cp -r extension/output/chrome-mv3 "extension/output/$FOLDER"
          (cd extension/output && 7za a -tzip "../../$ARCHIVE" "$FOLDER")
          rm -rf "extension/output/$FOLDER"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create GitHub Release in private repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --repo kippolitov/job-posting-analyzer-releases \
            --title "$TAG_NAME" \
            --notes "Built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}" \
            "${{ env.ARCHIVE }}"

      # Publishes to the live listing (item kbdecogbebgmeefjkppickfgegbheipc).
      # Requires all four CHROME_* secrets: the item id plus a Google Cloud
      # OAuth client + refresh token with the chromewebstore scope. With the
      # item id unset the step is skipped entirely (forks / private-repo-only
      # releases); with the id set but credentials incomplete it warns and
      # skips rather than failing — a failed release cannot simply be re-run,
      # because the duplicate-release guard above rejects the existing tag.
      - name: Publish to Chrome Web Store
        if: env.CHROME_EXTENSION_ID != ''
        run: |
          if [ -z "$CHROME_CLIENT_ID" ] || [ -z "$CHROME_CLIENT_SECRET" ] || [ -z "$CHROME_REFRESH_TOKEN" ]; then
            echo "::warning title=Chrome Web Store publish skipped::CHROME_EXTENSION_ID is set but CHROME_CLIENT_ID / CHROME_CLIENT_SECRET / CHROME_REFRESH_TOKEN are missing. v${VERSION} was NOT submitted to the store."
            exit 0
          fi

          # Store builds must never carry the e2e-only localhost host
          # permissions (npm run build:e2e); they trigger a manual review
          # justification. A plain `npm run build` omits them.
          if grep -q '127\.0\.0\.1' extension/output/chrome-mv3/manifest.json; then
            echo "ERROR: built manifest contains localhost host permissions (e2e build?); refusing to upload"
            exit 1
          fi

          # The Chrome Web Store API requires manifest.json at the zip root;
          # $ARCHIVE above wraps it in a versioned folder for the releases
          # repo, so build a second, flat archive just for this upload.
          CWS_ARCHIVE="chrome-web-store-v${{ env.VERSION }}.zip"
          (cd extension/output/chrome-mv3 && 7za a -tzip "../../../$CWS_ARCHIVE" .)

          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "$CWS_ARCHIVE" \
            --extension-id "$CHROME_EXTENSION_ID" \
            --client-id "$CHROME_CLIENT_ID" \
            --client-secret "$CHROME_CLIENT_SECRET" \
            --refresh-token "$CHROME_REFRESH_TOKEN"

          npx --yes chrome-webstore-upload-cli@3 publish \
            --extension-id "$CHROME_EXTENSION_ID" \
            --client-id "$CHROME_CLIENT_ID" \
            --client-secret "$CHROME_CLIENT_SECRET" \
            --refresh-token "$CHROME_REFRESH_TOKEN"

  # NOTE: e2e tests intentionally do not run here — run them locally before
  # releasing: cd extension; $env:E2E='1'; npm run test:e2e
